<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planillas YPF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 { color: #333; margin-bottom: 6px; font-size: 22px; }
        .subtitle { color: #999; font-size: 13px; margin-bottom: 20px; }

        /* ── Tabla manual ── */
        .scroll-wrapper {
            max-height: 70vh;
            overflow-y: auto;
            margin-bottom: 14px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        th { padding: 10px 8px; text-align: left; font-weight: 600; white-space: nowrap; }

        tbody tr:nth-child(even) { background: #f8f9fa; }
        tbody tr:hover { background: #e8eaff; }

        td { padding: 4px 8px; border-bottom: 1px solid #dee2e6; white-space: nowrap; }

        td.name-cell {
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #495057;
            min-width: 80px;
        }

        td.diff-cell {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #888;
            min-width: 70px;
        }

        td.diff-cell.positive { color: #28a745; font-weight: 600; }
        td.diff-cell.negative { color: #dc3545; font-weight: 600; }

        td input {
            width: 90px;
            padding: 5px 6px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        td input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }

        /* ── Botones ── */
        .actions { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            padding: 11px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            color: white;
        }

        .btn-blue  { background: #667eea; }
        .btn-green { background: #28a745; }
        .btn-red   { background: #dc3545; }

        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn.copied { background: #10b981 !important; }

        /* ── PDF panel ── */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            background: #f8f9ff;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover, .upload-area.dragging { border-color: #764ba2; background: #f0f1ff; }
        .upload-icon { font-size: 44px; margin-bottom: 10px; }
        .upload-text { color: #333; font-size: 15px; }
        .upload-hint { color: #999; font-size: 12px; margin-top: 4px; }

        #fileInput { display: none; }

        .results { display: none; margin-top: 20px; }
        .results.visible { display: block; }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .results-title { font-size: 16px; font-weight: 600; color: #333; }

        .output-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.7;
            max-height: 55vh;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .count { margin-top: 8px; color: #888; font-size: 12px; font-style: italic; }

        .error {
            background: #fee; border: 1px solid #fcc; color: #c33;
            padding: 12px; border-radius: 8px; margin-top: 16px; display: none;
        }
        .error.visible { display: block; }

        .loading { display: none; text-align: center; margin-top: 16px; }
        .loading.visible { display: block; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 38px; height: 38px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1100px) {
            .main-container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="main-container">

    <!-- ══ PANEL IZQUIERDO: Surtidores Manuales ══ -->
    <div class="panel">
        <h1>📋 Surtidores Manuales</h1>
        <p class="subtitle">Completa los valores de Inicial y Final</p>

        <div class="scroll-wrapper">
            <table id="surtidorTable">
                <thead>
                    <tr>
                        <th>Surtidor</th>
                        <th>Inicial</th>
                        <th>Final</th>
                        <th>Dif</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="actions">
            <button class="btn btn-green" id="btnOrder">🔄 Ordenar</button>
            <button class="btn btn-blue"  id="btnCopyTable">📋 Copiar</button>
            <button class="btn btn-red"   id="btnClear">🗑️ Limpiar</button>
        </div>
    </div>

    <!-- ══ PANEL DERECHO: Surtidores Automáticos ══ -->
    <div class="panel">
        <h1>📊 Surtidores Automáticos</h1>
        <p class="subtitle">Extrae la columna "Final" de planillas YPF</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Arrastra tu PDF aquí o haz clic para seleccionar</div>
            <div class="upload-hint">Planillas de playa YPF</div>
        </div>
        <input type="file" id="fileInput" accept=".pdf">

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Procesando PDF…</div>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="results-header">
                <div class="results-title">Valores extraídos</div>
                <button class="btn btn-blue" style="flex:none;padding:9px 20px;" id="btnCopy">📋 Copiar</button>
            </div>
            <div class="output-box" id="output"></div>
            <div class="count" id="count"></div>
        </div>
    </div>

</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ══════════════════════════════════════════════
//  SURTIDORES MANUALES
// ══════════════════════════════════════════════

const DESORDENADOS = [
    '2INF1','1SUPER1','4INF D1','3D5001',
    '2INF2','1SUPER2','4INF D2','3D5002',
    '2INF3','1SUPER3','4INF D3','3D5003',
    '2INF4','1SUPER4','4INF D4','3D5004',
    '2INF5','1SUPER5','4INF D5','3D5005',
    '2INF6','1SUPER6','4INF D6','3D5006',
    '2INF7','1SUPER7','4INF D7','3D5007',
    '2INF8','1SUPER8','4INF D8','3D5008',
    '4INF9','3D5009'
];

const ORDENADOS = [
    '1SUPER1','1SUPER2','1SUPER3','1SUPER4','1SUPER5','1SUPER6','1SUPER7','1SUPER8',
    '2INF1','2INF2','2INF3','2INF4','2INF5','2INF6','2INF7','2INF8',
    '3D5001','3D5002','3D5003','3D5004','3D5005','3D5006','3D5007','3D5008','3D5009',
    '4INF D1','4INF D2','4INF D3','4INF D4','4INF D5','4INF D6','4INF D7','4INF D8',
    '4INF9'
];

// Mapa de datos: clave = nombre surtidor, valor = { inicial, final }
const datos = {};
DESORDENADOS.forEach(s => { datos[s] = { inicial: '', final: '' }; });

let isOrdered = false;

const tableBody   = document.getElementById('tableBody');
const btnOrder    = document.getElementById('btnOrder');
const btnCopyTable= document.getElementById('btnCopyTable');
const btnClear    = document.getElementById('btnClear');

function saveFromDOM() {
    // Leer todos los inputs y guardar en el mapa `datos`
    document.querySelectorAll('tr[data-key]').forEach(row => {
        const key = row.dataset.key;
        datos[key].inicial = row.querySelector('.inp-ini').value;
        datos[key].final   = row.querySelector('.inp-fin').value;
    });
}

function renderTable() {
    const order = isOrdered ? ORDENADOS : DESORDENADOS;
    tableBody.innerHTML = '';

    order.forEach(surtidor => {
        const d = datos[surtidor] || { inicial: '', final: '' };

        const ini = parseFloat(d.inicial) || 0;
        const fin = parseFloat(d.final)   || 0;
        const diff = (d.inicial || d.final) ? (fin - ini) : null;

        let diffText  = '';
        let diffClass = 'diff-cell';
        if (diff !== null) {
            diffText = diff.toFixed(2);
            if (diff > 0) diffClass += ' positive';
            else if (diff < 0) diffClass += ' negative';
        }

        const tr = document.createElement('tr');
        tr.dataset.key = surtidor;
        tr.innerHTML = `
            <td class="name-cell">${surtidor}</td>
            <td><input class="inp-ini" type="text" value="${d.inicial}" placeholder="0.00"></td>
            <td><input class="inp-fin" type="text" value="${d.final}"   placeholder="0.00"></td>
            <td class="${diffClass}">${diffText}</td>
        `;
        tableBody.appendChild(tr);
    });

    addListeners();
}

function addListeners() {
    const inputs = tableBody.querySelectorAll('input');
    inputs.forEach((inp, idx) => {
        // Actualizar diff en tiempo real
        inp.addEventListener('input', () => {
            const row = inp.closest('tr');
            const key = row.dataset.key;
            datos[key].inicial = row.querySelector('.inp-ini').value;
            datos[key].final   = row.querySelector('.inp-fin').value;

            const ini  = parseFloat(datos[key].inicial) || 0;
            const fin  = parseFloat(datos[key].final)   || 0;
            const diff = (datos[key].inicial || datos[key].final) ? (fin - ini) : null;
            const diffCell = row.querySelector('td:last-child');
            diffCell.className = 'diff-cell';
            if (diff !== null) {
                diffCell.textContent = diff.toFixed(2);
                if (diff > 0) diffCell.classList.add('positive');
                else if (diff < 0) diffCell.classList.add('negative');
            } else {
                diffCell.textContent = '';
            }
        });

        // Enter: saltar a misma columna, siguiente fila
        inp.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            // Cada fila tiene 2 inputs; saltar 2 posiciones
            const next = inputs[idx + 2];
            if (next) next.focus();
        });
    });
}

btnOrder.addEventListener('click', () => {
    saveFromDOM();
    isOrdered = !isOrdered;
    btnOrder.textContent = isOrdered ? '↩️ Desordenar' : '🔄 Ordenar';
    renderTable();
});

btnCopyTable.addEventListener('click', () => {
    saveFromDOM();
    const order = isOrdered ? ORDENADOS : DESORDENADOS;

    // Detectar si hay datos en cada columna
    const hayInicial = order.some(s => datos[s].inicial.trim() !== '');
    const hayFinal   = order.some(s => datos[s].final.trim()   !== '');

    let lines = [];
    order.forEach(s => {
        const ini = datos[s].inicial.trim();
        const fin = datos[s].final.trim();
        if (hayInicial && hayFinal) {
            lines.push(`${ini || '0'}\t${fin || '0'}`);
        } else if (hayInicial) {
            lines.push(ini || '0');
        } else if (hayFinal) {
            lines.push(fin || '0');
        }
    });

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
        btnCopyTable.textContent = '✓ Copiado';
        btnCopyTable.classList.add('copied');
        setTimeout(() => {
            btnCopyTable.textContent = '📋 Copiar';
            btnCopyTable.classList.remove('copied');
        }, 2000);
    });
});

btnClear.addEventListener('click', () => {
    if (!confirm('¿Limpiar todos los campos?')) return;
    DESORDENADOS.forEach(s => { datos[s] = { inicial: '', final: '' }; });
    isOrdered = false;
    btnOrder.textContent = '🔄 Ordenar';
    renderTable();
});

// Iniciar tabla
renderTable();

// ══════════════════════════════════════════════
//  SURTIDORES AUTOMÁTICOS (PDF)
// ══════════════════════════════════════════════

const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');
const loading    = document.getElementById('loading');
const errorDiv   = document.getElementById('error');
const results    = document.getElementById('results');
const output     = document.getElementById('output');
const countDiv   = document.getElementById('count');
const btnCopy    = document.getElementById('btnCopy');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragging'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragging'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragging');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') processFile(f);
    else showError('Por favor, selecciona un archivo PDF válido.');
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

btnCopy.addEventListener('click', () => {
    const text = output.textContent.trim();
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
        btnCopy.textContent = '✓ Copiado';
        btnCopy.classList.add('copied');
        setTimeout(() => {
            btnCopy.textContent = '📋 Copiar';
            btnCopy.classList.remove('copied');
        }, 2000);
    });
});

async function processFile(file) {
    showError(''); errorDiv.classList.remove('visible');
    results.classList.remove('visible');
    loading.classList.add('visible');
    try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let items = [];
        for (let p = 1; p <= pdf.numPages; p++) {
            const page = await pdf.getPage(p);
            const tc = await page.getTextContent();
            items = items.concat(tc.items);
        }
        const vals = extractFinal(items);
        if (!vals.length) { showError('No se encontraron valores en la columna "Final".'); return; }
        output.textContent = vals.join('\n');
        countDiv.textContent = `Total: ${vals.length} valores`;
        results.classList.add('visible');
    } catch(err) {
        showError('Error: ' + err.message);
    } finally {
        loading.classList.remove('visible');
    }
}

function extractFinal(items) {
    // Agrupar tokens por línea (misma coordenada Y ±2px)
    const lines = [];
    let cur = [], lastY = null;
    for (const item of items) {
        const txt = item.str.trim();
        const y   = Math.round(item.transform[5]);
        if (lastY !== null && Math.abs(y - lastY) > 2) {
            if (cur.length) lines.push(cur);
            cur = [];
        }
        if (txt) cur.push(txt);
        lastY = y;
    }
    if (cur.length) lines.push(cur);

    const vals = [];
    for (const line of lines) {
        // Líneas de surtidor empiezan con el precio: "$" seguido de número
        if (!line[0].startsWith('$')) continue;

        // Extraer todos los tokens numéricos de la línea
        const nums = [];
        for (const tok of line) {
            // Cada token puede ser un número con formato "155885,91" o "2045,0000"
            if (/^\d[\d\.,]*$/.test(tok)) nums.push(tok);
        }

        // Estructura esperada (ignorando el $):
        // [precio, surtidor_num, inicial, FINAL, manual, lts, importe]
        // índices en nums (sin el $):
        //   0 = precio (ej: 2045,0000)
        //   1 = nro surtidor (ej: 02)
        //   2 = inicial
        //   3 = FINAL  ← queremos este
        //   4 = manual
        //   5 = lts
        //   6 = importe
        if (nums.length >= 7) {
            vals.push(nums[3]);
        }
    }
    return vals;
}

function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.classList.toggle('visible', msg !== '');
}
</script>
</body>
</html>
