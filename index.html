<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor de Columna Final - Planillas YPF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragging {
            border-color: #764ba2;
            background: #e8e9ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.visible {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .results-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .btn-copy {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }

        .btn-copy:active {
            transform: translateY(0);
        }

        .btn-copy.copied {
            background: #10b981;
        }

        .output-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .count {
            margin-top: 10px;
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Extractor de Columna Final</h1>
        <p class="subtitle">Extrae los valores de la columna "Final" de planillas YPF</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Arrastra tu PDF aquí o haz clic para seleccionar</div>
            <div class="upload-hint">Soporta archivos PDF de planillas de playa</div>
        </div>

        <input type="file" id="fileInput" accept=".pdf">

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Procesando archivo...</div>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="results-header">
                <div class="results-title">Valores extraídos:</div>
                <button class="btn-copy" id="btnCopy">📋 Copiar</button>
            </div>
            <div class="output-box" id="output"></div>
            <div class="count" id="count"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const output = document.getElementById('output');
        const count = document.getElementById('count');
        const btnCopy = document.getElementById('btnCopy');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                processFile(file);
            } else {
                showError('Por favor, selecciona un archivo PDF válido.');
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        });

        btnCopy.addEventListener('click', () => {
            const text = output.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btnCopy.textContent = '✓ Copiado';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 Copiar';
                    btnCopy.classList.remove('copied');
                }, 2000);
            });
        });

        async function processFile(file) {
            hideError();
            results.classList.remove('visible');
            loading.classList.add('visible');

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }

                const finalValues = extractFinalColumn(fullText);
                
                if (finalValues.length === 0) {
                    showError('No se encontraron valores en la columna "Final". Verifica que el PDF tenga el formato esperado.');
                    return;
                }

                displayResults(finalValues);
            } catch (err) {
                showError(`Error al procesar el archivo: ${err.message}`);
            } finally {
                loading.classList.remove('visible');
            }
        }

        function extractFinalColumn(text) {
            const values = [];
            
            // Patrón para encontrar las líneas de productos con la estructura:
            // $ precio surtidor inicial FINAL manual lts importe
            const pattern = /\$\s*[\d,\.]+\s+\d+\s+\w+\s+([\d,\.]+)\s+([\d,\.]+)\s+[\d,\.]+\s+[\d,\.]+\s+[\d,\.]+/g;
            
            let match;
            while ((match = pattern.exec(text)) !== null) {
                // El segundo grupo captura es el valor "Final"
                const finalValue = match[2];
                values.push(finalValue);
            }

            return values;
        }

        function displayResults(values) {
            output.textContent = values.join('\n');
            count.textContent = `Total: ${values.length} valores encontrados`;
            results.classList.add('visible');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('visible');
        }

        function hideError() {
            error.classList.remove('visible');
        }
    </script>
</body>
</html>
